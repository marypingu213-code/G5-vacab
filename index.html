<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>語詞大挑戰 - 多人搶答整合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; overflow: hidden; touch-action: manipulation; }
        .buzzer-btn { 
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            box-shadow: 0 10px 0 #96281b, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }
        .buzzer-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #96281b, 0 5px 10px rgba(0,0,0,0.4); }
        .buzzer-btn:disabled { filter: grayscale(100%); cursor: not-allowed; transform: translateY(10px); box-shadow: none; }
        
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .reel-shadow { box-shadow: inset 0 20px 30px -10px rgba(0,0,0,0.3), inset 0 -20px 30px -10px rgba(0,0,0,0.3); }

        @keyframes pullLever {
            0% { transform: rotateX(0deg); }
            40% { transform: rotateX(75deg); }
            60% { transform: rotateX(75deg); }
            100% { transform: rotateX(0deg); }
        }
        .lever-pull { animation: pullLever 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .lever-wrapper { perspective: 800px; }
        
        .hide-scrollbar::-webkit-scrollbar { width: 6px; }
        .hide-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        
        .font-kai { font-family: 'BiauKai', 'DFKai-SB', 'Kaiti TC', '楷體', serif; font-weight: bold; }
    </style>
</head>
<body class="h-full bg-gray-100 text-gray-800">

    <div id="app" class="w-full h-full flex flex-col items-center justify-center">
        <div id="loadingScreen" class="text-2xl font-bold">系統初始化中...</div>
    </div>

    <template id="tpl-landing">
        <div class="flex flex-col gap-6 items-center p-8 bg-white rounded-3xl shadow-xl max-w-lg w-full text-center border-t-8 border-sky-400">
            <h1 class="text-4xl font-bold text-gray-800">💎 語詞大挑戰</h1>
            <p class="text-gray-500">請選擇今天的遊戲模式</p>
            
            <div class="grid grid-cols-1 gap-4 w-full">
                <button onclick="initTeacher(2)" class="py-6 text-2xl font-bold text-white bg-sky-500 rounded-2xl shadow-lg hover:bg-sky-600 transition">
                    二字語詞模式
                </button>
                <button onclick="initTeacher(4)" class="py-6 text-2xl font-bold text-white bg-red-500 rounded-2xl shadow-lg hover:bg-red-600 transition">
                    四字成語模式
                </button>
            </div>
            
            <div class="w-full border-t border-gray-200 my-2"></div>
            <p class="text-sm text-gray-400">學生端請直接掃描老師產生的 QR Code</p>
        </div>
    </template>

    <template id="tpl-teacher">
        <div class="w-full h-full flex p-4 gap-4 overflow-hidden bg-gray-900">
            <div class="flex-1 relative bg-gray-800 rounded-3xl shadow-inner flex flex-col items-center justify-center p-8 border-4 border-gray-700">
                
                <div id="machine-body" class="w-full max-w-6xl rounded-3xl border-[16px] p-6 relative flex flex-col items-center" style="height: 60vh;">
                    <div id="machine-title" class="w-full text-center text-white font-black text-3xl md:text-4xl mb-6 tracking-widest drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)] border-b-4 pb-4"></div>

                    <div class="absolute top-1/2 -right-[46px] w-[30px] h-32 bg-gradient-to-r from-gray-500 to-gray-700 rounded-r-2xl border-y-4 border-r-4 border-gray-800 shadow-[10px_0_20px_rgba(0,0,0,0.6)] -translate-y-1/2 z-0 flex justify-center items-center">
                        <div class="w-3 h-24 bg-gray-900 rounded-full shadow-inner"></div>
                    </div>

                    <div class="lever-wrapper absolute top-1/2 -right-10 w-20 h-56 -translate-y-1/2 z-10 cursor-pointer flex justify-center" onclick="if(!document.getElementById('spinBtn').disabled) game.teacherSpin()">
                        <div id="leverRod" class="w-full h-full relative origin-bottom transition-transform duration-300">
                            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-4 h-32 bg-gradient-to-r from-gray-300 via-white to-gray-500 rounded-t-full shadow-[inset_-2px_0_5px_rgba(0,0,0,0.3)]"></div>
                            <div class="absolute top-[10px] left-1/2 -translate-x-1/2 w-14 h-14 bg-gradient-to-br from-red-400 via-red-600 to-red-900 rounded-full shadow-[0_8px_15px_rgba(0,0,0,0.5)]"></div>
                        </div>
                    </div>

                    <div id="reels-container" class="w-full flex-1 bg-gray-200 rounded-2xl border-[12px] border-gray-300 flex items-center justify-center overflow-hidden relative p-3 gap-3 z-10">
                        <div class="absolute w-full h-[2px] bg-red-500/10 top-1/2 -translate-y-1/2 z-20 pointer-events-none"></div>
                    </div>
                </div>

                <div id="winnerArea" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center z-50 backdrop-blur-sm">
                    <div id="winnerMsg" class="bg-gradient-to-b from-yellow-400 to-yellow-600 text-red-900 px-16 py-10 rounded-3xl shadow-[0_0_100px_rgba(253,224,71,0.5)] text-6xl md:text-8xl font-kai border-8 border-white pop-in text-center flex flex-col gap-6">
                        <span id="winnerName" class="text-white drop-shadow-lg font-black"></span>
                        <span class="text-5xl md:text-6xl">搶答成功！</span>
                    </div>
                </div>
            </div>

            <div class="w-80 bg-white rounded-3xl shadow-lg flex flex-col p-4 overflow-hidden border-4 border-gray-300 z-20 relative">
                <div class="mb-2 text-center flex-none">
                    <h2 class="text-xl font-black text-gray-800">控制台</h2>
                    <div id="qrcode" class="flex justify-center my-2 p-2 bg-white border-2 border-dashed border-gray-300 rounded-xl"></div>
                    <input type="text" id="roomIdDisplay" class="w-full text-center text-xs font-bold text-blue-600 bg-blue-50 py-1.5 rounded-lg border-none focus:ring-0" readonly onclick="this.select();" />
                </div>

                <div class="mb-2 flex-none">
                    <h3 class="font-bold text-sm text-gray-600 mb-2 flex justify-between items-center border-b pb-1">
                        <span>📚 題庫選擇</span>
                        <span class="text-xs font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full" id="wordCountDisplay">目前 0 詞</span>
                    </h3>
                    <div class="grid grid-cols-2 gap-1.5 max-h-32 overflow-y-auto hide-scrollbar p-1 text-sm bg-gray-50 rounded-lg border mb-2" id="lessonCheckboxes"></div>
                    <textarea id="wordInput" class="w-full h-16 p-2 border-2 border-gray-200 rounded-lg text-xs focus:border-sky-400 outline-none resize-none" placeholder="手動新增 (用空白分隔)"></textarea>
                    <button onclick="updateSelectedWords()" class="mt-1 w-full py-1.5 bg-gray-700 text-white rounded-lg text-xs font-bold shadow-md">更新題庫</button>
                </div>

                <div class="flex-1 overflow-y-auto mb-3 border-2 border-gray-200 rounded-xl p-2 bg-gray-50 hide-scrollbar">
                    <h3 class="font-bold text-sm text-gray-600 mb-2 sticky top-0 bg-gray-50 pb-1 border-b z-10">學生列表 (<span id="studentCount" class="text-blue-600">0</span>)</h3>
                    <div id="studentList" class="space-y-1.5"></div>
                </div>

                <button id="spinBtn" onclick="game.teacherSpin()" class="py-4 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-black text-2xl shadow-[0_6px_0_#991b1b] active:translate-y-2 transition-all disabled:opacity-50 tracking-widest">
                    啟動拉桿！
                </button>
            </div>
        </div>
    </template>

    <template id="tpl-student">
        <div class="w-full h-full flex flex-col items-center justify-between p-6 bg-slate-900 text-white relative overflow-hidden">
            <div class="w-full flex justify-between items-center z-10 bg-white/10 p-4 rounded-2xl backdrop-blur-sm border border-white/20">
                <div class="text-lg opacity-90">代號: <span id="myStudentName" class="font-black text-yellow-400 text-2xl"></span></div>
                <div class="px-4 py-2 bg-white/20 rounded-full text-sm font-bold" id="connectionStatus">連線中</div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-center w-full z-10 text-center">
                <div id="studentMessage" class="text-2xl text-gray-400 font-bold mb-6">等待老師啟動拉霸機...</div>
                <div id="studentWord" class="font-kai text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] hidden pop-in leading-tight"></div>
            </div>

            <div class="w-full max-w-md aspect-square mb-8 z-10 flex items-center justify-center">
                <button id="buzzerBtn" onclick="game.studentBuzz()" disabled class="buzzer-btn w-64 h-64 rounded-full text-6xl font-black text-white border-8 border-red-900 flex flex-col items-center justify-center">
                    <span>搶答</span>
                </button>
            </div>
        </div>
    </template>

    <template id="tpl-login">
        <div class="flex flex-col gap-6 items-center p-8 bg-white rounded-3xl shadow-2xl max-w-sm w-full mx-4 border-t-8 border-sky-400">
            <h2 class="text-3xl font-black text-gray-800">加入房間</h2>
            <input type="text" id="inputName" placeholder="請輸入你的代號" class="w-full px-4 py-4 bg-gray-50 border-2 border-gray-300 rounded-xl text-xl text-center font-bold">
            <button onclick="joinGame()" id="joinBtn" class="w-full py-4 bg-sky-500 text-white rounded-xl font-bold text-2xl shadow-[0_6px_0_#0284c7] active:translate-y-2">進入遊戲</button>
        </div>
    </template>

    <script>
        // --- 整合題庫 ---
        const wordDatabase2 = {
            "第一課": ["客廳", "灑水", "閱讀", "飲料", "氣氛", "獎券"],
            "第二課": ["出席", "掌聲", "倒映", "軍人", "盲人", "繽紛"],
            "第三課": ["濃霧", "芭樂", "巡邏", "嚴格", "車庫", "道歉"],
            "第四課": ["老闆", "販賣", "盜賊", "分辨", "審判", "饒命"],
            "第九課": ["靜謐", "乍看", "職業", "證明", "裁判", "誇獎"],
            "第十二課": ["俯瞰", "收割", "滋潤", "號碼", "根據", "矗立"]
        };
        const wordDatabase4 = {
            "數字成語": ["一石二鳥", "七上八下", "十全十美", "九牛一毛", "三心二意"],
            "動物成語": ["井底之蛙", "亡羊補牢", "守株待兔", "狐假虎威", "畫蛇添足"],
            "自然風景": ["山明水秀", "海闊天空", "風平浪靜", "春暖花開", "風和日麗"],
            "智慧努力": ["熟能生巧", "半途而廢", "學無止境", "精益求精", "持之以恆"]
        };

        let currentMode = 2; // 預設 2 字
        let words = [];       
        let peer = null, connections = [], myConn = null, isTeacher = false, currentStudentName = "", buzzerLocked = false; 

        function showToast(msg, type='error') {
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-500 text-white' : (type === 'warning' ? 'bg-yellow-400 text-gray-900' : 'bg-green-500 text-white');
            toast.className = `fixed top-10 left-1/2 transform -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl font-black text-2xl z-[100] pop-in border-4 border-white ${bg}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            currentMode = parseInt(urlParams.get('mode')) || 2;
            
            if (joinId) {
                showTemplate('tpl-login');
                window.roomId = joinId;
            } else {
                showTemplate('tpl-landing');
            }
        });

        function showTemplate(id) { document.getElementById('app').innerHTML = document.getElementById(id).innerHTML; }

        function initTeacher(mode) {
            currentMode = mode;
            showTemplate('tpl-teacher');
            isTeacher = true;

            const machineBody = document.getElementById('machine-body');
            const machineTitle = document.getElementById('machine-title');
            const reelsContainer = document.getElementById('reels-container');

            if(mode === 2) {
                machineBody.className = machineBody.className + " bg-sky-300 border-sky-500 shadow-[0_15px_0_#0284c7]";
                machineTitle.className = machineTitle.className + " border-sky-500";
                machineTitle.innerText = "💎 二字語詞大挑戰 💎";
            } else {
                machineBody.className = machineBody.className + " bg-red-300 border-red-500 shadow-[0_15px_0_#b91c1c]";
                machineTitle.className = machineTitle.className + " border-red-500";
                machineTitle.innerText = "🔥 四字成語大挑戰 🔥";
            }

            // 動態產生滾輪
            reelsContainer.innerHTML += Array.from({length: mode}, (_, i) => `
                <div id="reel${i+1}-container" class="flex-1 h-full bg-white rounded-xl overflow-hidden relative border-2 border-gray-400 reel-shadow">
                    <div id="reel${i+1}-strip" class="w-full h-full flex flex-col">
                        <div class="w-full h-full flex items-center justify-center font-kai text-gray-800 text-center px-1" style="font-size: ${mode === 2 ? '8rem' : '6rem'}">${['準','備','開','始'][i] || '★'}</div>
                    </div>
                </div>
            `).join('');

            renderCheckboxes();
            
            peer = new Peer(null, { debug: 2 });
            peer.on('open', (id) => {
                const joinUrl = `${window.location.href.split('?')[0]}?join=${id}&mode=${mode}`;
                document.getElementById('roomIdDisplay').value = joinUrl;
                new QRCode(document.getElementById("qrcode"), { text: joinUrl, width: 120, height: 120 });
            });
            peer.on('connection', (conn) => {
                conn.on('data', (data) => handleTeacherData(conn, data));
                conn.on('close', () => removeStudent(conn.peer));
            });
        }

        function renderCheckboxes() {
            const container = document.getElementById('lessonCheckboxes');
            const db = currentMode === 2 ? wordDatabase2 : wordDatabase4;
            container.innerHTML = Object.keys(db).map(lesson => `
                <label class="flex items-center space-x-2 cursor-pointer hover:bg-gray-200 p-1 rounded">
                    <input type="checkbox" value="${lesson}" class="lesson-cb w-4 h-4" onchange="updateSelectedWords()">
                    <span class="text-gray-700 font-bold">${lesson}</span>
                </label>
            `).join('');
            updateSelectedWords();
        }

        function updateSelectedWords() {
            const checkboxes = document.querySelectorAll('.lesson-cb:checked');
            const db = currentMode === 2 ? wordDatabase2 : wordDatabase4;
            let newWords = [];
            checkboxes.forEach(cb => { newWords = newWords.concat(db[cb.value]); });
            const input = document.getElementById('wordInput');
            if (input?.value.trim()) {
                newWords = newWords.concat(input.value.split(/\s+/).filter(w => w.length === currentMode));
            }
            words = [...new Set(newWords)];
            document.getElementById('wordCountDisplay').textContent = `目前 ${words.length} 詞`;
        }

        function handleTeacherData(conn, data) {
            if (data.type === 'JOIN') {
                conn.studentName = data.name; conn.score = 0;
                connections.push(conn); updateStudentList();
                conn.send({ type: 'WELCOME' });
            } else if (data.type === 'BUZZ' && !buzzerLocked) {
                buzzerLocked = true;
                broadcast({ type: 'WINNER', name: conn.studentName });
                highlightWinner(conn.studentName);
            }
        }

        function updateStudentList() {
            document.getElementById('studentCount').textContent = connections.length;
            document.getElementById('studentList').innerHTML = connections.map(conn => `
                <div id="student-${conn.peer}" class="flex items-center justify-between p-2 mb-1 bg-white border rounded-lg shadow-sm">
                    <span class="font-bold text-gray-700 truncate w-20">${conn.studentName}</span>
                    <div class="flex items-center gap-2">
                        <span class="score-badge bg-yellow-100 px-2 py-1 rounded text-xs font-black">${conn.score} 分</span>
                        <button onclick="addScore('${conn.peer}', 1)" class="text-green-600 bg-green-50 rounded px-2 font-bold">+1</button>
                    </div>
                </div>
            `).join('');
        }

        function addScore(peerId, pts) {
            const conn = connections.find(c => c.peer === peerId);
            if (conn) { conn.score += pts; updateStudentList(); }
        }

        function highlightWinner(name) {
            document.getElementById('winnerName').textContent = name;
            document.getElementById('winnerArea').classList.remove('hidden');
            const btn = document.getElementById('spinBtn');
            btn.disabled = false; btn.innerHTML = "🎰 下一題！";
        }

        function broadcast(data) { connections.forEach(c => c.send(data)); }

        // --- 學生端 ---
        function joinGame() {
            const name = document.getElementById('inputName').value.trim();
            if (!name) return showToast("請輸入代號！");
            currentStudentName = name;
            showTemplate('tpl-student');
            document.getElementById('myStudentName').textContent = name;
            document.getElementById('studentWord').style.fontSize = currentMode === 2 ? '6rem' : '4rem';

            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(window.roomId);
                conn.on('open', () => {
                    document.getElementById('connectionStatus').textContent = "已連線";
                    conn.send({ type: 'JOIN', name: name });
                    myConn = conn;
                });
                conn.on('data', handleStudentData);
            });
        }

        function handleStudentData(data) {
            const msgEl = document.getElementById('studentMessage'), wordEl = document.getElementById('studentWord'), btn = document.getElementById('buzzerBtn');
            if (data.type === 'SPIN_START') {
                msgEl.textContent = "🎰 拉霸轉動中..."; wordEl.classList.add('hidden'); btn.disabled = true;
            } else if (data.type === 'SPIN_RESULT') {
                msgEl.textContent = "👇 快按搶答！"; wordEl.innerHTML = data.word; wordEl.classList.remove('hidden'); btn.disabled = false;
            } else if (data.type === 'WINNER') {
                btn.disabled = true;
                msgEl.textContent = (data.name === currentStudentName) ? "🎉 恭喜搶到了！" : `❌ ${data.name} 搶先了`;
            } else if (data.type === 'RESET') {
                msgEl.textContent = "等待老師啟動..."; wordEl.classList.add('hidden'); btn.disabled = true;
                btn.style.background = ""; btn.style.boxShadow = "";
            }
        }

        const game = {
            teacherSpin: async function() {
                if (words.length < 1) return showToast("❌ 請勾選題庫！");
                const spinBtn = document.getElementById('spinBtn');
                spinBtn.disabled = true; buzzerLocked = true;
                document.getElementById('winnerArea').classList.add('hidden');
                
                const leverRod = document.getElementById('leverRod');
                leverRod.classList.add('lever-pull');
                setTimeout(() => leverRod.classList.remove('lever-pull'), 700);

                broadcast({ type: 'RESET' });
                
                setTimeout(async () => {
                    broadcast({ type: 'SPIN_START' });
                    const targetWord = words[Math.floor(Math.random() * words.length)];
                    const promises = [];
                    for(let i=0; i<currentMode; i++) {
                        const char = targetWord[i] || " ";
                        const pool = words.map(w => w[i] || " ");
                        promises.push(this.executePhysicalSpin(`reel${i+1}-container`, `reel${i+1}-strip`, 2000 + i*800, char, pool));
                    }
                    await Promise.all(promises);
                    buzzerLocked = false; spinBtn.disabled = false;
                    broadcast({ type: 'SPIN_RESULT', word: targetWord });
                }, 100);
            },
            executePhysicalSpin: function(containerId, stripId, duration, finalChar, pool) {
                return new Promise(resolve => {
                    const container = document.getElementById(containerId), strip = document.getElementById(stripId);
                    const cellHeight = container.clientHeight;
                    const spins = 30;
                    let html = '';
                    for(let i=0; i<spins-1; i++) {
                        html += `<div class="w-full flex-shrink-0 flex items-center justify-center font-kai text-gray-800" style="height: ${cellHeight}px; font-size: ${currentMode === 2 ? '8rem' : '6rem'}">${pool[Math.floor(Math.random()*pool.length)]}</div>`;
                    }
                    html += `<div class="w-full flex-shrink-0 flex items-center justify-center font-kai text-red-600" style="height: ${cellHeight}px; font-size: ${currentMode === 2 ? '8rem' : '6rem'}">${finalChar}</div>`;
                    strip.innerHTML = html; strip.style.transition = 'none'; strip.style.transform = `translateY(0px)`;
                    void strip.offsetHeight;
                    strip.style.transition = `transform ${duration}ms cubic-bezier(0.15, 0.85, 0.2, 1.05)`;
                    strip.style.transform = `translateY(${-(spins-1)*cellHeight}px)`;
                    setTimeout(resolve, duration);
                });
            },
            studentBuzz: function() { if(myConn) myConn.send({ type: 'BUZZ' }); }
        };
    </script>
</body>
</html>
